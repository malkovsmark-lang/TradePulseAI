<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradePulseAI</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .buy {
            color: #22c55e;
        }

        .sell {
            color: #ef4444;
        }
    </style>
</head>
<body>

<h1>TradePulseAI</h1>

<div class="card">
    <h3>EUR/USD</h3>
    <p class="buy">BUY · 72%</p>
</div>

<div class="card">
    <h3>GBP/USD</h3>
    <p class="sell">SELL · 68%</p>
</div>

</body>
</html>
